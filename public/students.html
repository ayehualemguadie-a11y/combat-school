<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የሰልጣኞች እና የምርቃት ፎቶ ማሳያ</title>
    <!-- ካንተ style.css ጋር እንዲገናኝ ያደርገዋል -->
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* 1. አዲሱን የጭስ ፎቶ በጀርባ (Background) ላይ መለጠፍ */
        body {
            background-image: url('images/bg-smoke.png'); /* የፎቶውን ስም ከዚህ ጋር ማመሳሰል አስፈላጊ ነው */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* የላይኛው መመለሻ አሞሌ (Navigation Area) */
        .nav-bar {
            background-color: rgba(44, 62, 80, 0.85); /* የጀርባው ፎቶ በጥቂቱ እንዲታይ ለማድረግ */
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        /* ወደ ኋላ መመለሻ (Home በተን) ስታይል - በትክክለኛው ሊንክ የተሰራ */
        .home-btn {
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.3s ease;
        }
        .home-btn:hover {
            background-color: #c0392b;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
            text-align: center;
        }
        
        /* በጥቁር ጀርባ ላይ ጽሑፉ በደንብ እንዲታይ ነጭ ቀለም */
        .gallery-title {
            color: #ffffff;
            margin-bottom: 5px;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        
        /* 2. መፈክር (Slogan) ስታይል - በጥቁር ጀርባ ላይ ደምቆ እንዲወጣ ወርቃማ ቀለም */
        .slogan {
            color: #f1c40f; 
            font-size: 22px;
            font-weight: bold;
            font-style: italic;
            margin-top: 10px;
            margin-bottom: 25px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* ንዑስ ርዕስ */
        .gallery-subtitle {
            color: #ecf0f1;
            margin-bottom: 30px;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 10px;
        }
        
        .photo-card {
            background: rgba(255, 255, 255, 0.95); /* ፎቶዎቹ ጎልተው እንዲታዩ የካርዱ ጀርባ ነጭ */
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .photo-card:hover {
            transform: translateY(-5px);
        }
        
        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            background-color: #ddd;
        }
        
        .photo-info {
            padding: 15px;
            background: #fdfdfd;
            border-top: 1px solid #eee;
        }
        
        .photo-info h3 {
            margin: 0 0 5px 0;
            font-size: 18px;
            color: #2c3e50;
        }
        
        .photo-info p {
            margin: 0;
            color: #27ae60;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- የላይኛው መመለሻ አሞሌ ከነ Home በተኑ -->
    <div class="nav-bar">
        <span style="color: white; font-weight: bold; font-size: 18px;">የምርቃት እና ስልጠና ፎቶዎች</span>
        <!-- ትክክለኛው የሆም በተን አድራሻ (/) እዚህ ገብቷል -->
        <a href="/" class="home-btn">🏠 ወደ ዋናው ገጽ (Home) ተመለስ</a>
    </div>

    <div class="gallery-container">
        <h1 class="gallery-title">የሰልጣኞች እና የምርቃት መዝገብ ፎቶዎች</h1>
        
        <!-- መፈክር (Slogan) -->
        <p class="slogan">"እናቅዳለን፤ እንጀምራለን፤ እናሰፋለን፤ በፍጥነት እና በጥራት እንፈጽማለን!"</p>
        
        <p class="gallery-subtitle">የስልጠና እንቅስቃሴ ሁኔታ</p>

        <div class="photo-grid">
            
            <!-- ፎቶ 1 -->
            <div class="photo-card">
                <img src="images/training1.jpg" alt="የሰልጣኞች ስልጠና">
                <div class="photo-info">
                    <h3>የሰልጣኞች ተግባራዊ ልምምድ</h3>
                    <p>በስልጠና ላይ</p>
                </div>
            </div>

            <!-- ፎቶ 2 -->
            <div class="photo-card">
                <img src="images/training2.jpg" alt="የምርቃት ስነ-ስርዓት">
                <div class="photo-info">
                    <h3>የምርቃት እና የሽልማት ስነ-ስርዓት</h3>
                    <p>የምርቃት ቀን</p>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
