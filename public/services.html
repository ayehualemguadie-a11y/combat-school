<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የሚሰጡ አገልግሎቶች - Services</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        body {
            background-image: url('images/bg-smoke.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .nav-bar {
            background-color: rgba(44, 62, 80, 0.85);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .home-btn {
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.3s ease;
        }
        .home-btn:hover {
            background-color: #c0392b;
        }

        .services-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        
        .page-title {
            color: #ffffff;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .page-subtitle {
            color: #ecf0f1;
            font-size: 16px;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* 💡 መቶ አለቃ፣ ፎቶው ከላይ መግለጫው ከታች እንዲሆን የተሰራው የካርድ ማዕቀፍ */
        .service-card-grid {
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .service-card {
            background: #ffffff;
            width: 100%;
            max-width: 550px; /* በላኩት ፎቶ ልክ መካከለኛ ስፋት */
            border-radius: 16px; /* ውብ የክብደት ማዕዘን */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: left;
            border: 3px solid #fbbf24; /* ወርቃማ ፍሬም */
            position: relative;
        }

        /* 📐 ፎቶው ሳይንዘረጠጥና ሳይቆረጥ መጠኑ አነስ ብሎ የተቀመጠበት ልክ */
        .card-image-wrapper {
            width: 100%;
            height: 240px; /* 💡 በላኩት ፎቶ ልክ ቁመቱ በጥራት አነስ ተደርጓል */
            position: relative;
            background-color: #000;
        }

        .card-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
        }

        /* በፎቶው ላይ የሚንሳፈፉት ትናንሽ በተኖች (ልክ እንደ ላኩት ምስል) */
        .badge-essential {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #f39c12;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .image-labels {
            position: absolute;
            bottom: 15px;
            left: 15px;
            display: flex;
            gap: 10px;
        }

        .img-btn {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.4);
        }

        /* ✍️ መግለጫው ከታች የሚቀመጥበት ንጹሕ ክፍል */
        .card-content {
            padding: 25px;
            background: #ffffff;
        }

        .card-content h2 {
            margin: 0 0 12px 0;
            color: #1a252f;
            font-size: 24px;
            font-weight: bold;
        }

        .card-content p {
            margin: 0;
            color: #5a6c7d;
            font-size: 16px;
            line-height: 1.7;
            font-weight: 500;
            text-align: justify;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <span style="color: white; font-weight: bold; font-size: 18px;">የውጊያ ቴክኒክ ትምህርት ቤት</span>
        <a href="/" class="home-btn">🏠 ወደ ዋናው ገጽ (Home) ተመለስ</a>
    </div>

    <div class="services-container">
        <h1 class="page-title">ት/ቤቱ  የሚሰጣቸው አገልግሎቶች </h1>
        <p class="page-subtitle">አዋሽ አርባ ደረጃ ሁለት ሆስፒታል</p>

        <div class="service-card-grid">
            
            <!-- 💡 መቶ አለቃ፣ አዲሱ ዘመናዊ የጤና ተቋም ካርድ እዚህ ይጀምራል -->
            <div class="service-card">
                
                <!-- የላይኛው የፎቶ ክፍል (ቁመቱ አነስ ያለ) -->
                <div class="card-image-wrapper">
                    <img src="images/hospital.jpg" alt="የጤና ተቋም">
                    <div class="badge-essential">★ Essential</div>
                    <div class="image-labels">
                        <div class="img-btn">Health Services 🏥</div>
                        <div class="img-btn">24/7 Emergency 🚑</div>
                    </div>
                </div>

                <!-- የታችኛው የመግለጫ ክፍል -->
                <div class="card-content">
                    <h2>Student Health Center</h2>
                    <p>
                      የአዋሽ አርባ ደረጃ ሁለት ሆስፒታል በዋናነት ለአባላቱ እና ለአካባቢው ማህበረሰብ ድንገተኛ የመጀመሪያ ደረጃ ህክምና፣ የተመላላሽ ታካሚ (OPD) አገልግሎት፣ የቁስል እንክብካቤ እና የወባ በሽታ መከላከያ ህክምና ይሰጣል።
                    </p>
                </div>

            </div>

        </div>
    </div>

</body>
</html>
