<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add News</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<img src="images/logo.jpg" width="100">

<h1>Main Directorate of Defense Education and Training</h1>

<p>Combat Technic School</p>

</header>

<section>

<div class="card">

<h2>Add News & Announcement</h2>

<form action="/upload-news" method="POST" enctype="multipart/form-data">

<label>News Title</label><br><br>

<input
type="text"
name="title"
style="width:100%;padding:10px;"
required>

<br><br>

<label>Description</label><br><br>

<textarea
name="description"
rows="8"
style="width:100%;padding:10px;"
required></textarea>

<br><br>

<label>News Image</label><br><br>

<input
type="file"
name="image"
accept="image/*"
required>

<br><br>

<button type="submit">

Publish News

</button>

</form>

</div>

</section>

</body>
</html>
